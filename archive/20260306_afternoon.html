const inputs=document.querySelectorAll(".code-input input");
inputs.forEach((inp,i)=>{
  inp.addEventListener("input",e=>{
    inp.value=inp.value.toUpperCase();
    if(inp.value&&i<3)inputs[i+1].focus();
  });
  inp.addEventListener("keydown",e=>{
    if(e.key==="Backspace"&&!inp.value&&i>0)inputs[i-1].focus();
    if(e.key==="Enter")unlock();
  });
});
inputs[0].focus();
function b64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}
async function unlock(){
  const code=Array.from(inputs).map(i=>i.value).join("");
  if(code.length!==4){document.getElementById("errMsg").textContent="请输入 4 位验证码";return}
  const btn=document.getElementById("unlockBtn");
  const err=document.getElementById("errMsg");
  btn.disabled=true;btn.textContent="解密中...";err.textContent="";
  try{
    const enc=new TextEncoder();
    const km=await crypto.subtle.importKey("raw",enc.encode(code),"PBKDF2",false,["deriveKey"]);
    const key=await crypto.subtle.deriveKey(
      {name:"PBKDF2",salt:b64(D.salt),iterations:100000,hash:"SHA-256"},
      km,{name:"AES-GCM",length:256},false,["decrypt"]
    );
    const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(D.nonce)},key,b64(D.ct));
    const html=new TextDecoder().decode(pt);
    document.getElementById("gate").style.display="none";
    const r=document.getElementById("report");
    r.innerHTML=html;r.style.display="block";
    document.body.style.background="#f5f5f5";
  }catch(e){
    err.textContent="验证码错误，请重新输入";
    btn.disabled=false;btn.textContent="解锁报告";
    inputs.forEach(i=>i.value="");inputs[0].focus();
  }
}
</script>
